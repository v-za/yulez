<title>Yulissa Benitez</title>
<style>
  @font-face{font-family:"Blocky";src:url(__FONT__) format("woff2");font-weight:400;font-style:normal;font-display:swap}
  :root{
    --ink:#0b0b0e; --ink-2:#101014;
    --line:rgba(240,232,220,.11);
    --bone:#f5efe6; --red:#ff2116;
    --gap:clamp(12px,1.8vw,22px);
    --maxw:1360px;
    --display:"Blocky","Arial Black",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas",monospace;
    --ease:cubic-bezier(.16,.84,.32,1);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:auto}
  body{margin:0;background:var(--ink);color:var(--bone);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:600;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity:.05;mix-blend-mode:screen}
  ::selection{background:var(--red);color:#0b0b0e}
  img{display:block;max-width:100%}

  #progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--red);z-index:750;pointer-events:none}

  html.cursor-on, html.cursor-on *{cursor:none !important}
  #cursor{position:fixed;top:0;left:0;z-index:710;pointer-events:none;
    width:9px;height:9px;margin:-4.5px 0 0 -4.5px;border-radius:50%;background:var(--red);
    display:grid;place-items:center;font-family:var(--mono);font-weight:700;letter-spacing:.14em;
    font-size:0;color:#0b0b0e;text-transform:uppercase;
    transition:width .28s var(--ease),height .28s var(--ease),font-size .2s,background .28s}
  #cursor.view{width:78px;height:78px;margin:-39px 0 0 -39px;background:rgba(255,33,22,.94);font-size:.62rem}
  html:not(.cursor-on) #cursor{display:none}

  #smooth-wrap{width:100%}
  html.smooth #smooth-wrap{position:fixed;top:0;left:0;will-change:transform}
  #spacer{display:none}
  html.smooth #spacer{display:block}
  html:not(.ready) body{overflow:hidden;height:100svh}

  /* ---------- cinematic hero ---------- */
  .cover{position:relative;height:100svh;width:100%;overflow:hidden;background:var(--ink)}
  .flat{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:68% center;z-index:0}
  #gl{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block}
  html.nogl #gl{display:none}
  .cover::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(130% 105% at 62% 44%,transparent 46%,rgba(5,5,8,.62) 100%),
      linear-gradient(to top,rgba(8,8,10,.86) 0%,rgba(8,8,10,.08) 30%,transparent 55%)}

  .name{position:absolute;left:clamp(16px,4vw,54px);bottom:clamp(22px,4.6vh,54px);z-index:4;margin:0;
    font-family:var(--display);font-weight:400;text-transform:uppercase;line-height:.84;
    letter-spacing:.005em;font-size:clamp(3rem,13.5vw,11rem);
    color:rgba(240,31,20,.78);mix-blend-mode:normal;opacity:0;
    text-shadow:0 2px 18px rgba(0,0,0,.4)}
  .name span{display:block}
  html.revealName .name:not(.ghost){animation:nameIn .95s var(--ease) forwards}
  html.noanim .name{opacity:1}
  @keyframes nameIn{0%{opacity:0;transform:translateX(-24px);clip-path:inset(0 100% 0 0)}
    55%{opacity:1}100%{opacity:1;transform:none;clip-path:inset(0 -3% 0 0)}}
  /* horizontal motion-streak ghosts — the shutter drag, left to right */
  .name.ghost{z-index:3;pointer-events:none;opacity:0;mix-blend-mode:normal;color:#ff2d1c;-webkit-text-stroke:0}
  html.noanim .name.ghost{display:none}
  html.revealName .name.g1{animation:gh1 .72s linear forwards}
  html.revealName .name.g2{animation:gh2 .8s linear forwards}
  html.revealName .name.g3{animation:gh3 .9s linear forwards}
  @keyframes gh1{0%{opacity:.62;transform:translateX(-58px);filter:blur(3px)}100%{opacity:0;transform:none;filter:blur(0)}}
  @keyframes gh2{0%{opacity:.44;transform:translateX(-116px);filter:blur(6px)}100%{opacity:0;transform:translateX(-6px);filter:blur(1px)}}
  @keyframes gh3{0%{opacity:.3;transform:translateX(-180px);filter:blur(10px)}100%{opacity:0;transform:translateX(-18px);filter:blur(2px)}}
  .name .ca{display:inline-block;width:.778em;height:.688em;vertical-align:baseline;margin:0}
  .name .ca .cbody{fill:currentColor}
  .name .ca .cstar{fill:#0b0b0e}
  .name.ghost .ca .cstar{display:none}

  .rule{position:absolute;left:clamp(18px,4vw,56px);bottom:clamp(10px,2.4vh,26px);z-index:4;
    height:2px;width:0;background:var(--red);opacity:.9}
  html.playing .rule{animation:draw .9s var(--ease) 5.2s forwards}
  html.noanim .rule{width:min(320px,58vw)}
  @keyframes draw{to{width:min(320px,58vw)}}
  .scrollhint{position:absolute;right:clamp(16px,4vw,54px);bottom:clamp(20px,4vh,48px);z-index:4;
    width:26px;height:42px;border:1px solid rgba(245,239,230,.4);border-radius:14px;opacity:0}
  html.ready .scrollhint{opacity:1;transition:opacity .6s}
  .scrollhint::after{content:"";position:absolute;left:50%;top:8px;width:3px;height:8px;margin-left:-1.5px;
    border-radius:2px;background:var(--red);animation:sh 1.8s ease-in-out infinite}
  @keyframes sh{0%{transform:translateY(0);opacity:1}70%{transform:translateY(14px);opacity:0}100%{opacity:0}}

  /* ---------- marquee ---------- */
  .marquee-band{border-block:1px solid var(--line);padding:clamp(18px,3vw,30px) 0;overflow:hidden;background:var(--ink-2)}
  .marquee{display:flex;width:max-content;animation:slide 34s linear infinite}
  .marquee:hover{animation-play-state:paused}
  .marquee .it{font-family:var(--display);font-size:clamp(1.9rem,6vw,4.4rem);text-transform:uppercase;
    white-space:nowrap;color:transparent;-webkit-text-stroke:1.3px rgba(245,239,230,.5);padding-left:clamp(20px,3vw,44px)}
  .marquee .sep{color:var(--red);-webkit-text-stroke:0;font-size:.55em;padding:0 clamp(18px,2.6vw,40px);vertical-align:.18em}
  @keyframes slide{to{transform:translateX(-50%)}}

  /* ---------- gallery ---------- */
  .gallery{columns:3 300px;column-gap:0;padding:0;max-width:none;margin:0}
  .frame{position:relative;margin:0;break-inside:avoid;overflow:hidden;
    background:var(--ink-2);display:block;line-height:0}
  html.js .frame{clip-path:inset(0 0 100% 0);transform:translateY(28px);
    transition:clip-path 1s var(--ease),transform 1s var(--ease),border-color .4s}
  html.js .frame.in{clip-path:inset(0 0 0 0);transform:none}
  .frame img{width:100%;height:auto;transition:transform 1.1s var(--ease),filter .5s;
    filter:saturate(.9) contrast(1.02)}
  .frame:hover img{transform:scale(1.055);
    filter:saturate(1.14) contrast(1.05) drop-shadow(1.6px 0 0 rgba(255,0,40,.4)) drop-shadow(-1.6px 0 0 rgba(0,220,255,.32))}
  .frame:hover{border-color:rgba(255,33,22,.55)}

  /* ---------- lightbox ---------- */
  #lightbox{position:fixed;inset:0;z-index:800;background:rgba(6,6,9,.96);
    display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
  #lightbox.open{opacity:1;pointer-events:auto}
  #lightbox img{max-width:92vw;max-height:88vh;width:auto;height:auto;object-fit:contain;
    box-shadow:0 30px 120px rgba(0,0,0,.6)}
  .lb-anim{animation:lbwkw .55s steps(4,end)}
  @keyframes lbwkw{0%{opacity:.3;transform:translateX(-30px) scale(.99);filter:blur(10px)}100%{opacity:1;transform:none;filter:blur(0)}}
  #lightbox button{position:absolute;background:none;border:0;color:var(--bone);cursor:pointer;
    font-family:var(--mono);line-height:1;-webkit-tap-highlight-color:transparent}
  html.cursor-on #lightbox button{cursor:none}
  .lb-close{top:clamp(14px,3vw,30px);right:clamp(16px,3vw,34px);font-size:2rem;opacity:.7}
  .lb-prev,.lb-next{top:50%;transform:translateY(-50%);font-size:2.6rem;opacity:.55;padding:20px}
  .lb-prev{left:clamp(6px,2vw,24px)}.lb-next{right:clamp(6px,2vw,24px)}
  #lightbox button:hover{opacity:1;color:var(--red)}
  .lb-count{position:absolute;bottom:clamp(14px,3vw,28px);left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;color:rgba(245,239,230,.6)}

  @media (max-width:820px){.gallery{columns:2 220px}}
  @media (max-width:520px){.gallery{columns:1}}
  @media (prefers-reduced-motion:reduce){
    html.js .frame{clip-path:inset(0);transform:none}
    .scrollhint::after{animation:none}.marquee{animation:none}
  }
</style>

<div id="progress"></div>

<div id="smooth-wrap">
  <section class="cover" id="hero">
    <img id="coverImg" class="flat" alt="">
    <canvas id="gl"></canvas>
    <h1 class="name"><span>YULISS<svg class="ca" viewBox="0 0 778 688" aria-hidden="true"><g transform="matrix(1 0 0 -1 0 688)"><path class="cbody" d="__AGLYPH_OUTER__"/><path class="cstar" d="__AGLYPH_STAR__"/></g></svg></span><span>BENITEZ</span></h1>
    <div class="rule" aria-hidden="true"></div>
    <div class="scrollhint" aria-hidden="true"></div>
  </section>

  <div class="marquee-band"><div class="marquee" id="marquee"></div></div>
  <div class="gallery" id="gallery"></div>
</div>
<div id="spacer"></div>

<div id="cursor">View</div>

<div id="lightbox" aria-hidden="true">
  <button class="lb-close" aria-label="Close">&times;</button>
  <button class="lb-prev" aria-label="Previous">&#8249;</button>
  <img id="lbImg" alt="">
  <button class="lb-next" aria-label="Next">&#8250;</button>
  <div class="lb-count" id="lbCount"></div>
</div>

<script>
const IMG = __IMGDATA__;
const DEPTH = __DEPTH__;
(function(){
  var html=document.documentElement; html.classList.add('js');
  var FINE=matchMedia('(pointer:fine)').matches;
  var REDUCE=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var SMOOTH=FINE&&!REDUCE;
  var clamp=function(v,a,b){return v<a?a:v>b?b:v;}, lerp=function(a,b,t){return a+(b-a)*t;};

  document.getElementById('coverImg').src = IMG.tulle.uri;

  /* ---------- WebGL depth hero ---------- */
  var GL=null;
  (function initGL(){
    var cv=document.getElementById('gl');
    var gl=cv.getContext('webgl',{antialias:true,alpha:false,premultipliedAlpha:false});
    if(!gl){ html.classList.add('nogl'); return; }
    function sh(t,src){var s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
      if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.warn(gl.getShaderInfoLog(s));return null;}return s;}
    var vs=sh(gl.VERTEX_SHADER,'attribute vec2 p;varying vec2 vUv;void main(){vUv=p*0.5+0.5;gl_Position=vec4(p,0.0,1.0);}');
    var fs=sh(gl.FRAGMENT_SHADER,[
      'precision highp float;',
      'uniform sampler2D uImg;uniform sampler2D uDepth;',
      'uniform vec2 uFocal;uniform vec2 uMouse;uniform vec2 uRes;',
      'uniform float uZoom;uniform float uImgAspect;uniform float uTime;uniform float uReveal;',
      'varying vec2 vUv;',
      'vec2 cover(vec2 uv){float ca=uRes.x/uRes.y;vec2 s=ca>uImgAspect?vec2(1.0,uImgAspect/ca):vec2(ca/uImgAspect,1.0);return (uv-0.5)*s+0.5;}',
      'void main(){',
      ' vec2 cc=vUv-0.5; float r2=dot(cc,cc);',
      ' vec2 uv0=0.5+cc*(1.0+0.03*r2);',
      ' vec2 uv=cover(uv0);',
      ' uv=(uv-uFocal)/uZoom+uFocal;',
      ' float d=texture2D(uDepth,clamp(uv,0.0,1.0)).r;',
      ' vec2 drift=vec2(sin(uTime*0.9),cos(uTime*0.62))*0.006*uReveal;',
      ' vec2 par=(uMouse*0.075+drift)*(d-0.4)*uReveal;',
      ' uv+=par;',
      ' float ab=((d-0.4)*0.003+length(uMouse)*0.005)*uReveal;',
      ' vec3 col;',
      ' col.r=texture2D(uImg,clamp(uv+vec2(ab,0.0),0.0,1.0)).r;',
      ' col.g=texture2D(uImg,clamp(uv,0.0,1.0)).g;',
      ' col.b=texture2D(uImg,clamp(uv-vec2(ab,0.0),0.0,1.0)).b;',
      ' vec2 e=min(uv,1.0-uv); float inside=smoothstep(-0.05,0.045,min(e.x,e.y));',
      ' col*=inside;',
      ' vec2 lp=vec2(0.5+0.32*sin(uTime*0.5),0.34);',
      ' float leak=smoothstep(0.55,0.0,length((vUv-lp)*vec2(uRes.x/uRes.y,1.0)));',
      ' col+=vec3(0.18,0.11,0.06)*leak*0.22*uReveal;',
      ' float g=fract(sin(dot(vUv+fract(uTime),vec2(12.9898,78.233)))*43758.5453);',
      ' col+=(g-0.5)*0.05;',
      ' float vg=length((vUv-0.5)*vec2(uRes.x/uRes.y,1.0));',
      ' col*=1.0-0.5*pow(clamp(vg*0.8,0.0,1.0),2.2);',
      ' gl_FragColor=vec4(col,1.0);',
      '}'].join('\n'));
    if(!vs||!fs){ html.classList.add('nogl'); return; }
    var pr=gl.createProgram();gl.attachShader(pr,vs);gl.attachShader(pr,fs);gl.linkProgram(pr);
    if(!gl.getProgramParameter(pr,gl.LINK_STATUS)){ html.classList.add('nogl'); return; }
    gl.useProgram(pr);
    var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    var lp=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
    var U={};['uImg','uDepth','uFocal','uMouse','uRes','uZoom','uImgAspect','uTime','uReveal'].forEach(function(n){U[n]=gl.getUniformLocation(pr,n);});
    function tex(unit){var t=gl.createTexture();gl.activeTexture(gl.TEXTURE0+unit);gl.bindTexture(gl.TEXTURE_2D,t);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,1,1,0,gl.RGB,gl.UNSIGNED_BYTE,new Uint8Array([10,10,14]));
      return t;}
    var tImg=tex(0), tDepth=tex(1), imgAspect=1.5, loaded=0;
    function upload(t,unit,img){gl.activeTexture(gl.TEXTURE0+unit);gl.bindTexture(gl.TEXTURE_2D,t);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);}
    var i1=new Image();i1.onload=function(){imgAspect=i1.naturalWidth/i1.naturalHeight;upload(tImg,0,i1);loaded++;};i1.src=IMG.tulle.uri;
    var i2=new Image();i2.onload=function(){upload(tDepth,1,i2);loaded++;};i2.src=DEPTH.depthmap;
    function resize(){var dpr=Math.min(devicePixelRatio||1,2);
      var w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight;
      cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);gl.viewport(0,0,cv.width,cv.height);}
    resize();window.addEventListener('resize',resize);
    gl.uniform1i(U.uImg,0);gl.uniform1i(U.uDepth,1);
    GL={gl:gl,U:U,cv:cv,get imgAspect(){return imgAspect;},ready:function(){return loaded>=2;}};
  })();

  /* WKW motion-streak ghost copies of the name */
  var nm=document.querySelector('.name'), hero=document.getElementById('hero');
  ['g1','g2','g3'].forEach(function(cls){var gh=nm.cloneNode(true);gh.classList.add('ghost',cls);
    gh.setAttribute('aria-hidden','true');hero.insertBefore(gh,nm);});

  /* gallery */
  var order=["puffer","band","legs","salon","hairpt","stair","diptych","profile","desert","bw","portrait","warehouse"];
  var g=document.getElementById('gallery');
  order.forEach(function(k,i){var im=IMG[k];var d=document.createElement('div');d.className='frame';d.dataset.i=i;
    d.innerHTML='<img loading="lazy" src="'+im.uri+'" width="'+im.w+'" height="'+im.h+'" alt="">';g.appendChild(d);});

  /* marquee */
  document.getElementById('marquee').innerHTML=('<span class="it">YULISSA BENITEZ</span><span class="sep">&#10022;</span>').repeat(8);

  /* intro */
  var heroStart=0, playing=false;
  if(REDUCE){ html.classList.add('noanim','ready'); }
  else{ requestAnimationFrame(function(){requestAnimationFrame(function(){
      html.classList.add('playing'); heroStart=performance.now(); playing=true; });});
    setTimeout(function(){ html.classList.add('ready'); }, 4350);
    /* name fires LAST — left-to-right shutter smear after the pull-back settles */
    setTimeout(function(){ html.classList.add('revealName'); }, 4250); }

  /* smooth rig */
  var wrap=document.getElementById('smooth-wrap'), spacer=document.getElementById('spacer'), cur=0, wrapH=0;
  function setSpacer(){ wrapH=wrap.getBoundingClientRect().height; spacer.style.height=wrapH+'px'; }
  if(SMOOTH){ html.classList.add('smooth'); setSpacer();
    if(window.ResizeObserver) new ResizeObserver(setSpacer).observe(wrap);
    window.addEventListener('resize',setSpacer); }
  else { wrapH=document.body.scrollHeight; window.addEventListener('resize',function(){wrapH=document.body.scrollHeight;}); }

  var tmx=0,tmy=0,mx=0,my=0;
  if(FINE) addEventListener('mousemove',function(e){tmx=(e.clientX/innerWidth*2-1);tmy=(e.clientY/innerHeight*2-1);},{passive:true});
  var vh=innerHeight, prog=document.getElementById('progress');
  window.addEventListener('resize',function(){vh=innerHeight;});

  function loop(now){
    var sc;
    if(SMOOTH){var t=window.scrollY;cur+=(t-cur)*0.09;if(Math.abs(t-cur)<0.06)cur=t;
      wrap.style.transform='translate3d(0,'+(-cur.toFixed(2))+'px,0)';sc=cur;}
    else sc=window.scrollY;

    mx+=(tmx-mx)*0.06; my+=(tmy-my)*0.06;
    if(GL && GL.ready()){
      var gl=GL.gl,U=GL.U;
      var tp=REDUCE?1:(playing?clamp((now-heroStart)/4000,0,1):0);
      var e=1-Math.pow(1-tp,3);
      var zoom=lerp(2.9,0.9,e);
      var reveal=clamp((tp-0.6)/0.4,0,1);
      gl.uniform1f(U.uZoom,zoom);
      gl.uniform1f(U.uReveal,REDUCE?0.0:reveal);
      gl.uniform2f(U.uFocal,DEPTH.fx,1.0-DEPTH.fy);
      gl.uniform2f(U.uMouse,mx,-my);
      gl.uniform2f(U.uRes,GL.cv.width,GL.cv.height);
      gl.uniform1f(U.uImgAspect,GL.imgAspect);
      gl.uniform1f(U.uTime,(now*0.0006)%1000.0);
      gl.drawArrays(gl.TRIANGLES,0,3);
    }
    runReveals();
    if(prog){ var mxs=Math.max(1,wrapH-vh); prog.style.width=(clamp(sc/mxs,0,1)*100).toFixed(2)+'%'; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* reveals — driven from the rAF loop so it works inside the transformed
     smooth-scroll container (IntersectionObserver misses transform-only moves) */
  var revealPending = Array.prototype.slice.call(document.querySelectorAll('.frame'));
  function runReveals(){
    if(!revealPending.length) return;
    for(var ri=revealPending.length-1; ri>=0; ri--){
      var fr=revealPending[ri];
      if(fr.getBoundingClientRect().top < vh*0.9){ fr.classList.add('in'); revealPending.splice(ri,1); }
    }
  }

  /* cursor */
  if(FINE){
    html.classList.add('cursor-on');
    var c=document.getElementById('cursor'),cx=innerWidth/2,cy=innerHeight/2,tx=cx,ty=cy;
    addEventListener('mousemove',function(e){tx=e.clientX;ty=e.clientY;},{passive:true});
    (function cl(){cx+=(tx-cx)*0.22;cy+=(ty-cy)*0.22;
      c.style.transform='translate3d('+cx.toFixed(2)+'px,'+cy.toFixed(2)+'px,0)';requestAnimationFrame(cl);})();
    g.addEventListener('mouseover',function(e){if(e.target.closest('.frame'))c.classList.add('view');});
    g.addEventListener('mouseout',function(e){if(e.target.closest('.frame'))c.classList.remove('view');});
  }

  /* lightbox */
  var lb=document.getElementById('lightbox'),lbImg=document.getElementById('lbImg'),
      lbCount=document.getElementById('lbCount'),idx=0;
  function smear(){lbImg.classList.remove('lb-anim');void lbImg.offsetWidth;lbImg.classList.add('lb-anim');}
  function show(i){idx=(i+order.length)%order.length;lbImg.src=IMG[order[idx]].uri;
    lbCount.textContent=String(idx+1).padStart(2,'0')+' / '+String(order.length).padStart(2,'0');smear();}
  function open(i){show(i);lb.classList.add('open');lb.setAttribute('aria-hidden','false');}
  function close(){lb.classList.remove('open');lb.setAttribute('aria-hidden','true');}
  g.addEventListener('click',function(e){var f=e.target.closest('.frame');if(f)open(+f.dataset.i);});
  document.querySelector('.lb-close').addEventListener('click',close);
  document.querySelector('.lb-next').addEventListener('click',function(e){e.stopPropagation();show(idx+1);});
  document.querySelector('.lb-prev').addEventListener('click',function(e){e.stopPropagation();show(idx-1);});
  lb.addEventListener('click',function(e){if(e.target===lb)close();});
  addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')close();else if(e.key==='ArrowRight')show(idx+1);else if(e.key==='ArrowLeft')show(idx-1);});
