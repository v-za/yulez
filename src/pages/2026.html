<title>Yulissa Benitez — 2026</title>
<!-- year gallery page (prototype): 14 selects from 2026, calm grid, lightbox
     with a caption slot. Linked from the year cover in 05-covers. -->
<style>
  @font-face{font-family:"Blocky";src:url(__FONT_ANTON__) format("woff2");font-weight:400;font-style:normal;font-display:swap}
  :root{
    --ink:#0b0b0e; --ink-2:#101014;
    --line:rgba(240,232,220,.11);
    --bone:#f5efe6; --red:#ff2116;
    --display:"Blocky","Arial Black",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas",monospace;
    --ease:cubic-bezier(.16,.84,.32,1);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--bone);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:600;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity:.05;mix-blend-mode:screen}
  ::selection{background:var(--red);color:#0b0b0e}

  /* arrival: we land here out of the eye-dive's flash — settle from white */
  body::after{content:"";position:fixed;inset:0;z-index:900;pointer-events:none;
    background:#f4f2ef;animation:land .7s ease-out .05s forwards}
  @keyframes land{to{opacity:0}}
  @media (prefers-reduced-motion:reduce){body::after{display:none}}

  header{position:sticky;top:0;z-index:500;display:flex;align-items:baseline;gap:22px;
    padding:16px clamp(16px,4vw,54px);background:rgba(10,10,13,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line)}
  header a{color:rgba(245,239,230,.6);text-decoration:none;font-family:var(--mono);
    font-size:.66rem;letter-spacing:.22em;text-transform:uppercase}
  header a:hover{color:var(--red)}
  header h1{margin:0;font-family:var(--display);font-weight:400;font-size:clamp(1.6rem,4vw,2.6rem);
    letter-spacing:.02em;color:var(--red)}
  header .n{margin-left:auto;font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;
    color:rgba(245,239,230,.45)}

  .gallery{columns:3 300px;column-gap:0}
  .frame{position:relative;margin:0;break-inside:avoid;overflow:hidden;background:var(--ink-2);line-height:0;cursor:pointer}
  .frame{opacity:0;transform:translateY(24px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
  .frame.in{opacity:1;transform:none}
  .frame img{width:100%;height:auto;transition:transform 1.1s var(--ease),filter .5s;
    filter:saturate(.9) contrast(1.02)}
  .frame:hover img{transform:scale(1.05);
    filter:saturate(1.14) contrast(1.05) drop-shadow(1.6px 0 0 rgba(255,0,40,.4)) drop-shadow(-1.6px 0 0 rgba(0,220,255,.32))}
  @media (max-width:820px){.gallery{columns:2 220px}}
  @media (max-width:520px){.gallery{columns:1}}
  @media (prefers-reduced-motion:reduce){.frame{opacity:1;transform:none;transition:none}}

  #lightbox{position:fixed;inset:0;z-index:800;background:rgba(6,6,9,.96);
    opacity:0;pointer-events:none;transition:opacity .45s,background .45s}
  #lightbox.open{opacity:1;pointer-events:auto}
  /* closing: backdrop and chrome clear out while the image flies home solid */
  #lightbox.closing{background:rgba(6,6,9,0);pointer-events:none}
  #lightbox.closing button,#lightbox.closing .lb-bar{opacity:0;transition:opacity .18s}
  #lightbox.closing img{box-shadow:none}
  /* the image is positioned in JS: it FLIPs from its grid slot to center and back */
  #lightbox img{position:fixed;margin:0;max-width:none;max-height:none;object-fit:cover;
    box-shadow:0 30px 120px rgba(0,0,0,.6)}
  .lb-anim{animation:lbwkw .55s steps(4,end)}
  @keyframes lbwkw{0%{opacity:.3;filter:blur(10px)}100%{opacity:1;filter:blur(0)}}
  #lightbox button{position:absolute;background:none;border:0;color:var(--bone);cursor:pointer;
    font-family:var(--mono);line-height:1}
  .lb-close{top:clamp(14px,3vw,30px);right:clamp(16px,3vw,34px);font-size:2rem;opacity:.7}
  .lb-prev,.lb-next{top:50%;transform:translateY(-50%);font-size:2.6rem;opacity:.55;padding:20px}
  .lb-prev{left:clamp(6px,2vw,24px)}.lb-next{right:clamp(6px,2vw,24px)}
  #lightbox button:hover{opacity:1;color:var(--red)}
  .lb-bar{position:absolute;bottom:clamp(14px,3vw,28px);left:50%;transform:translateX(-50%);
    display:flex;gap:26px;align-items:baseline;font-family:var(--mono);font-size:.7rem;
    letter-spacing:.2em;color:rgba(245,239,230,.6);text-transform:uppercase;white-space:nowrap}
  .lb-bar .cap{color:rgba(245,239,230,.85);letter-spacing:.08em}

  /* spot light-meter cursor: over any photo the cursor becomes a metering
     reticle with live EV / zone readouts sampled from the pixels under it */
  body.metering .frame, body.metering #lightbox, body.metering #lightbox img{cursor:none}
  #meter{position:fixed;left:0;top:0;z-index:950;pointer-events:none;opacity:0;
    width:52px;height:52px;margin:-26px 0 0 -26px;transition:opacity .22s}
  #meter .ring{position:absolute;inset:0;border:1px solid rgba(245,239,230,.9);border-radius:50%;
    box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  #meter .tick{position:absolute;left:50%;width:1px;height:6px;background:rgba(245,239,230,.9);margin-left:-.5px}
  #meter .t1{top:-2px}#meter .t2{bottom:-2px}
  #meter .dot{position:absolute;left:50%;top:50%;width:3px;height:3px;margin:-1.5px 0 0 -1.5px;
    border-radius:50%;background:var(--red)}
  #meter .rd{position:absolute;left:62px;top:50%;transform:translateY(-50%);
    font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
    color:rgba(245,239,230,.92);white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,.7)}
  #meter .rd b{display:block;font-weight:400;color:var(--red)}
  #meter.clip .ring{border-color:var(--red)}
  @media (prefers-reduced-motion:reduce){#meter{transition:none}}
</style>

<header>
  <a href="05-covers.html#yc2026">&larr; Back</a>
  <h1>2026</h1>
  <span class="n" id="count"></span>
</header>
<div class="gallery" id="gallery"></div>

<div id="lightbox" aria-hidden="true">
  <button class="lb-close" aria-label="Close">&times;</button>
  <button class="lb-prev" aria-label="Previous">&#8249;</button>
  <img id="lbImg" alt="">
  <button class="lb-next" aria-label="Next">&#8250;</button>
  <div class="lb-bar"><span id="lbCount"></span><span class="cap" id="lbCap"></span></div>
</div>

<div id="meter" aria-hidden="true">
  <span class="ring"></span><span class="tick t1"></span><span class="tick t2"></span>
  <span class="dot"></span>
  <span class="rd"><b id="mEv">EV --</b><span id="mZn">SPOT</span></span>
</div>

<script>
const IMG = __IMGFILES__;  /* real files + srcset — no inline photos on gallery pages */
(function(){
  /* prototype: the 2026 set = first 14 images; real data will carry year + captions */
  var order = Object.keys(IMG).slice(0, 14);
  var CAPS = {};   // key -> "publication / client / location" once metadata exists

  var g = document.getElementById('gallery');
  order.forEach(function(k, i){
    var im = IMG[k], d = document.createElement('div');
    d.className = 'frame'; d.dataset.i = i;
    d.innerHTML = '<img loading="lazy" src="' + im.src + '"'+(im.srcset ? ' srcset="' + im.srcset + '" sizes="(max-width:520px) 100vw, (max-width:820px) 50vw, 33vw"' : '')+' width="' + im.w + '" height="' + im.h + '" alt="Yulissa Benitez, 2026">';
    g.appendChild(d);
  });
  document.getElementById('count').textContent = order.length + ' SELECTS';

  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, {rootMargin: '0px 0px -8% 0px'});
    document.querySelectorAll('.frame').forEach(function(f){ io.observe(f); });
  } else {
    document.querySelectorAll('.frame').forEach(function(f){ f.classList.add('in'); });
  }

  var lb = document.getElementById('lightbox'), lbImg = document.getElementById('lbImg'),
      lbCount = document.getElementById('lbCount'), lbCap = document.getElementById('lbCap'),
      idx = 0, flying = false, hidden = null;
  var RM = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var EASE_IN = 'cubic-bezier(.18,.8,.26,1.04)';   /* grows with a whisper of overshoot */
  var EASE_OUT = 'cubic-bezier(.3,.72,.3,1)';       /* shrinks home, no bounce */
  var DUR = 560;

  function gridImg(i){ var f = g.querySelector('.frame[data-i="' + i + '"] img'); return f || null; }
  function setRect(r){ lbImg.style.left = r.left + 'px'; lbImg.style.top = r.top + 'px';
    lbImg.style.width = r.width + 'px'; lbImg.style.height = r.height + 'px'; }
  function centerRect(k){
    var w = +IMG[k].w, h = +IMG[k].h, s = Math.min(innerWidth * .92 / w, innerHeight * .82 / h);
    return { left: (innerWidth - w * s) / 2, top: (innerHeight - h * s) / 2, width: w * s, height: h * s };
  }
  /* transform-based FLIP: the image is laid out at `base`, and scale/translate
     carries it from `from` — GPU-composited, so the growth stays silky */
  function xformFor(from, base){
    var s = from.width / base.width;
    var dx = (from.left + from.width / 2) - (base.left + base.width / 2);
    var dy = (from.top + from.height / 2) - (base.top + base.height / 2);
    return 'translate(' + dx + 'px,' + dy + 'px) scale(' + s + ')';
  }
  function fly(from, base, ease, done){
    flying = true;
    setRect(base);
    lbImg.style.transition = 'none';
    lbImg.style.transform = xformFor(from, base);
    void lbImg.offsetWidth;
    lbImg.style.transition = 'transform ' + DUR + 'ms ' + ease;
    lbImg.style.transform = 'translate(0,0) scale(1)';
    var fin = function(){ lbImg.style.transition = ''; flying = false; done && done(); };
    setTimeout(fin, DUR + 60);
  }
  /* the reverse: from center back into the grid slot */
  function flyBack(base, to, ease, done){
    flying = true;
    setRect(base);
    lbImg.style.transition = 'none';
    lbImg.style.transform = 'translate(0,0) scale(1)';
    void lbImg.offsetWidth;
    lbImg.style.transition = 'transform ' + DUR + 'ms ' + ease;
    lbImg.style.transform = xformFor(to, base);
    /* land the image AT the grid slot: move its layout to `to` and drop the
       transform in the same paint, so clearing the transform doesn't snap it
       back to `base` (center) and flash during the close fade-out */
    var fin = function(){
      lbImg.style.transition = 'none';
      setRect(to);
      lbImg.style.transform = '';
      flying = false;
      done && done();
    };
    setTimeout(fin, DUR + 60);
  }
  function hideSource(i){ restoreSource(); var im = gridImg(i); if(im){ im.style.opacity = 0; hidden = im; } }
  function restoreSource(){ if(hidden){ hidden.style.opacity = ''; hidden = null; } }

  function meta(k){
    lbCount.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(order.length).padStart(2,'0');
    lbCap.textContent = CAPS[k] || '';
  }
  /* arrows: stay centered, keep the shutter smear */
  function show(i){
    idx = (i + order.length) % order.length;
    var k = order[idx];
    lbImg.src = IMG[k].src;
    lbImg.style.transition = 'none'; lbImg.style.transform = ''; setRect(centerRect(k));
    void lbImg.offsetWidth; lbImg.style.transition = '';
    restoreSource(); hideSource(idx);
    meta(k);
    lbImg.classList.remove('lb-anim'); void lbImg.offsetWidth; lbImg.classList.add('lb-anim');
  }
  function open(i){
    if (flying) return;
    idx = (i + order.length) % order.length;
    var k = order[idx];
    lbImg.classList.remove('lb-anim');
    lbImg.src = IMG[k].src;
    meta(k);
    lb.classList.add('open'); lb.setAttribute('aria-hidden','false');
    var src = gridImg(idx);
    if (RM || !src){ setRect(centerRect(k)); lbImg.style.transform = ''; hideSource(idx); return; }
    var r = src.getBoundingClientRect();
    hideSource(idx);
    fly({left:r.left, top:r.top, width:r.width, height:r.height}, centerRect(k), EASE_IN);
  }
  function close(){
    if (flying) return;
    var src = gridImg(idx);
    lb.setAttribute('aria-hidden','true');
    if (RM || !src){ lb.classList.remove('open'); restoreSource(); return; }
    var r = src.getBoundingClientRect();
    lbImg.classList.remove('lb-anim');
    lb.classList.add('closing');
    flyBack(centerRect(order[idx]), {left:r.left, top:r.top, width:r.width, height:r.height}, EASE_OUT, function(){
      lb.classList.remove('open'); lb.classList.remove('closing');
      restoreSource();
    });
  }
  g.addEventListener('click', function(e){ var f = e.target.closest('.frame'); if(f) open(+f.dataset.i); });
  document.querySelector('.lb-close').addEventListener('click', close);
  document.querySelector('.lb-next').addEventListener('click', function(e){ e.stopPropagation(); show(idx+1); });
  document.querySelector('.lb-prev').addEventListener('click', function(e){ e.stopPropagation(); show(idx-1); });
  lb.addEventListener('click', function(e){ if(e.target === lb) close(); });
  addEventListener('keydown', function(e){
    if(!lb.classList.contains('open')) return;
    if(e.key === 'Escape') close();
    else if(e.key === 'ArrowRight') show(idx+1);
    else if(e.key === 'ArrowLeft') show(idx-1);
  });

  /* ---- spot light-meter cursor ---- */
  if (matchMedia('(pointer:fine)').matches) (function(){
    var meter = document.getElementById('meter'),
        mEv = document.getElementById('mEv'), mZn = document.getElementById('mZn');
    var samp = new WeakMap(), tainted = false, raf = 0, pend = null;
    var ROM = ['0','I','II','III','IV','V','VI','VII','VIII','IX','X'];
    function canvasFor(img){
      var got = samp.get(img);
      if (got) return got;
      var w = 140, h = Math.max(1, Math.round(w * img.naturalHeight / Math.max(1, img.naturalWidth)));
      var c = document.createElement('canvas'); c.width = w; c.height = h;
      var x = c.getContext('2d', {willReadFrequently: true});
      try { x.drawImage(img, 0, 0, w, h); } catch(e){}
      got = {c: c, x: x}; samp.set(img, got); return got;
    }
    function lin(v){ v /= 255; return Math.pow(v, 2.2); }
    function run(){
      raf = 0;
      var e = pend; if (!e) return;
      var t = e.target;
      var over = t && t.tagName === 'IMG' && (t.closest('.frame') || t.closest('#lightbox'));
      if (!over || !t.complete || !t.naturalWidth || flying){
        meter.style.opacity = 0; document.body.classList.remove('metering'); return;
      }
      meter.style.transform = 'translate(' + e.clientX + 'px,' + e.clientY + 'px)';
      meter.style.opacity = 1; document.body.classList.add('metering');
      var r = t.getBoundingClientRect();
      var u = (e.clientX - r.left) / r.width, v = (e.clientY - r.top) / r.height;
      var lum = null;
      if (!tainted){
        try {
          var s = canvasFor(t);
          var px = s.x.getImageData(
            Math.max(0, Math.min(s.c.width - 1, Math.round(u * s.c.width))),
            Math.max(0, Math.min(s.c.height - 1, Math.round(v * s.c.height))), 1, 1).data;
          lum = 0.2126 * lin(px[0]) + 0.7152 * lin(px[1]) + 0.0722 * lin(px[2]);
        } catch(err){ tainted = true; }   /* file:// canvas taint — reticle only */
      }
      if (lum === null){ mEv.textContent = 'EV --'; mZn.textContent = 'SPOT'; meter.classList.remove('clip'); return; }
      var ev = Math.log2(Math.max(lum, 1e-4) / 0.18);
      var zone = Math.max(0, Math.min(10, Math.round(5 + ev)));
      mEv.textContent = 'EV ' + (ev >= 0 ? '+' : '') + ev.toFixed(1);
      mZn.textContent = 'ZONE ' + ROM[zone];
      meter.classList.toggle('clip', zone <= 0 || zone >= 10);
    }
    addEventListener('mousemove', function(e){ pend = e; if (!raf) raf = requestAnimationFrame(run); }, {passive: true});
    addEventListener('mouseout', function(e){ if (!e.relatedTarget){ meter.style.opacity = 0; document.body.classList.remove('metering'); } });
  })();
})();
</script>
